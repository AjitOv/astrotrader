# Render service spec — auto-deploys when GitHub push lands.
# Reference: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: astrotrader-engine
    runtime: docker
    plan: free                    # 512 MB RAM, sleeps after 15 min idle
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Warm all 13 symbols so Vercel's 10s function timeout doesn't strand
      # cold lookups. Startup takes ~5 min; /health returns OK immediately so
      # Render marks the service healthy while warmup proceeds in background.
      # If memory tightens, drop crypto/India first (BTC/ETH have the heaviest
      # 7-day-trading state matrices).
      - key: ASTROTRADE_WARMUP
        value: "SPY,QQQ,IWM,GLD,USO,XAUUSD,NIFTY,BANKNIFTY,RELIANCE,TCS,HDFCBANK,BTCUSD,ETHUSD"
      # Set this to your Vercel URL after the first Vercel deploy:
      #   https://<your-project>.vercel.app
      # Multiple origins comma-separated. Leave blank to use the local defaults.
      - key: ASTROTRADE_CORS_ORIGINS
        sync: false               # set in dashboard, not committed
    autoDeploy: true
